<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Posspole</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-white flex justify-center items-center min-h-screen px-4">
  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md text-center border border-gray-200">

    <!-- Logo -->
    <div class="flex justify-center logo-container mb-6">
      <a href="https://www.posspole.com/" target="_blank">
        <img src="Asset 4posspole_logo_svg.png" alt="Posspole Logo" class="h-16">
      </a>
    </div>

    <h2 class="text-xl font-semibold mb-4 text-black">LOG IN</h2>

    <!-- Toggle: Student | Admin -->
    <div class="flex justify-center mb-4">
      <div class="inline-flex bg-white border border-black rounded-full p-1">
        <button id="studentTab" type="button"
          class="px-6 py-1 rounded-full text-sm font-medium bg-black text-white transition duration-200">
          Student
        </button>
        <button id="adminTab" type="button"
          class="px-6 py-1 rounded-full text-sm font-medium text-black transition duration-200">
          Admin
        </button>
      </div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4 text-left">
      <input type="hidden" name="role" id="roleInput" value="student" />

      <div>
        <label for="email" class="block mb-1 text-sm font-medium text-black">Email Address</label>
        <input type="email" name="email" id="email" required
               class="w-full px-4 py-2 border border-gray-400 rounded-lg focus:outline-none focus:border-black text-black" />
      </div>

      <div>
        <label for="password" class="block mb-1 text-sm font-medium text-black">Password</label>
        <div class="relative flex items-center">
          <input type="password" name="password" id="password" required
                 class="w-full px-4 py-2 border border-gray-400 rounded-lg focus:outline-none focus:border-black text-black pr-10" />
          <button type="button" id="togglePassword"
                  class="absolute right-3 flex items-center justify-center h-full text-gray-600 focus:outline-none">
            <!-- Eye icon (show password) -->
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <!-- Eye slash icon (hide password) -->
            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.27-2.943-9.542-7a9.993 9.993 0 012.265-3.673M9.88 9.88A3 3 0 0114.12 14.12M15 12a3 3 0 00-3-3m0 0a3 3 0 00-3 3m0 0a3 3 0 003 3m6.12-6.12A9.953 9.953 0 0119.542 12c-1.273 4.057-5.065 7-9.542 7-1.09 0-2.137-.147-3.125-.425" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3l18 18" />
            </svg>
          </button>
        </div>
      </div>

      <div class="text-right text-sm">
        <a href="#" class="text-black hover:underline">Forgot Password?</a>
      </div>

      <button type="submit"
              class="w-full bg-black text-white font-semibold py-2 rounded-lg transition hover:bg-gray-800">
        Log in
      </button>
    </form>

    <!-- Register link -->
    <p class="text-sm mt-4 text-black">
      No account?
      <a href="register.html" class="font-medium hover:underline">Register</a>
    </p>
  </div>

  <!-- Script: Role Toggle & Eye Icon Toggle -->
  <script>
    const studentTab = document.getElementById("studentTab");
    const adminTab = document.getElementById("adminTab");
    const roleInput = document.getElementById("roleInput");
    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");

    studentTab.addEventListener("click", () => {
      studentTab.classList.add("bg-black", "text-white");
      studentTab.classList.remove("text-black");
      adminTab.classList.remove("bg-black", "text-white");
      adminTab.classList.add("text-black");
      roleInput.value = "student";
    });

    adminTab.addEventListener("click", () => {
      adminTab.classList.add("bg-black", "text-white");
      adminTab.classList.remove("text-black");
      studentTab.classList.remove("bg-black", "text-white");
      studentTab.classList.add("text-black");
      roleInput.value = "admin";
    });

    // Eye icon toggle
    const togglePasswordButton = document.getElementById("togglePassword");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    togglePasswordButton.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      eyeOpen.classList.toggle("hidden", !isPassword);
      eyeClosed.classList.toggle("hidden", isPassword);
    });

    // Form validation and redirection
    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const role = roleInput.value;
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      if (role === "student") {
        window.location.href = "user page.html";
      } else if (role === "admin") {
        window.location.href = "hr.html";
      }
    });
  </script>
</body>
</html>
